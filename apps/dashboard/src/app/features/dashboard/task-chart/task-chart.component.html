<div class="chart-container">
  <div class="chart-header">
    <h3 class="chart-title">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="chart-icon">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      Analytics
    </h3>

    <!-- Tab switcher -->
    <div class="chart-tabs">
      <button
        type="button"
        class="chart-tab"
        [class.chart-tab-active]="activeTab() === 'status'"
        (click)="setTab('status')"
      >
        By Status
      </button>
      <button
        type="button"
        class="chart-tab"
        [class.chart-tab-active]="activeTab() === 'category'"
        (click)="setTab('category')"
      >
        By Category
      </button>
    </div>
  </div>

  <div class="chart-canvas-wrapper">
    <canvas
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      type="bar"
    ></canvas>
  </div>
</div>

<style>
  .chart-container {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow: 0 1px 4px var(--shadow-color);
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .chart-title {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
  }

  .chart-icon {
    width: 1.125rem;
    height: 1.125rem;
    color: #6366f1;
  }

  .chart-tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--bg-secondary);
    padding: 0.25rem;
    border-radius: 8px;
  }

  .chart-tab {
    padding: 0.375rem 0.875rem;
    border: none;
    border-radius: 6px;
    font-size: 0.8125rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.2s;
  }

  .chart-tab:hover {
    color: var(--text-primary);
  }

  .chart-tab-active {
    background: var(--bg-primary);
    color: #6366f1;
    box-shadow: 0 1px 4px var(--shadow-color);
  }

  .chart-canvas-wrapper {
    position: relative;
    height: 200px;
  }
</style>
